<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>セキュリティ学習 - ログインシステム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 5px;
            display: none;
        }

        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .user-info {
            margin-top: 1rem;
        }

        .user-info h3 {
            margin-bottom: 0.5rem;
        }

        .user-info p {
            margin: 0.25rem 0;
        }

        .users-table {
            margin-top: 1rem;
            width: 100%;
            border-collapse: collapse;
        }

        .users-table th,
        .users-table td {
            padding: 0.5rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 0.8rem;
        }

        .users-table th {
            background-color: #f8f9fa;
            font-weight: 600;
        }

        .hint {
            margin-top: 2rem;
            padding: 1rem;
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 5px;
            font-size: 0.9rem;
        }

        .hint h4 {
            color: #856404;
            margin-bottom: 0.5rem;
        }

        .hint p {
            color: #856404;
            margin: 0.25rem 0;
        }

        .hint code {
            background: #f8f9fa;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>セキュリティ学習ログイン</h1>
            <p>教育用SQLインジェクション実演</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">ユーザー名:</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">パスワード:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn">ログイン</button>
        </form>

        <div id="result" class="result"></div>

        <div class="hint">
            <h4>🎯 学習目標:</h4>
            <p>SQLインジェクション技術を使用してログインをバイパスしてみてください。</p>
            <p>サンプルユーザー名: <code>admin</code>, <code>john_doe</code>, <code>jane_smith</code></p>
            <p>ヒント: ユーザー名フィールドに <code>' OR '1'='1</code> を使用するとどうなりますか？</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    resultDiv.className = 'result success';
                    resultDiv.style.display = 'block';
                    
                    let html = `
                        <h3>✅ ログイン成功！</h3>
                        <div class="user-info">
                            <p><strong>ID:</strong> ${data.user.id}</p>
                            <p><strong>ユーザー名:</strong> ${data.user.username}</p>
                            <p><strong>メールアドレス:</strong> ${data.user.email}</p>
                            <p><strong>氏名:</strong> ${data.user.full_name}</p>
                            <p><strong>ロール:</strong> ${data.user.role}</p>
                        </div>
                    `;

                    if (data.allUsers && data.allUsers.length > 1) {
                        html += `
                            <h4 style="margin-top: 1rem; color: #dc3545;">🚨 SQLインジェクション検出！</h4>
                            <p style="color: #dc3545;">複数のユーザーが返却されました - これはSQLインジェクション攻撃の成功を示しています！</p>
                            <table class="users-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>ユーザー名</th>
                                        <th>メールアドレス</th>
                                        <th>ロール</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;
                        
                        data.allUsers.forEach(user => {
                            html += `
                                <tr>
                                    <td>${user.id}</td>
                                    <td>${user.username}</td>
                                    <td>${user.email}</td>
                                    <td>${user.role}</td>
                                </tr>
                            `;
                        });
                        
                        html += `
                                </tbody>
                            </table>
                        `;
                    }

                    resultDiv.innerHTML = html;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `<h3>❌ ログイン失敗</h3><p>${data.error}</p>`;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `<h3>❌ エラー</h3><p>ネットワークエラー: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
